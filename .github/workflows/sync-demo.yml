name: Sync demo to template repo

on:
  push:
    branches:
      - main
      - beta
    paths:
      - 'demo/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup git identity
        run: |
          git config user.name "better-invite-bot[bot]"
          git config user.email "261293591+better-invite-bot[bot]@users.noreply.github.com"

      - name: Create subtree branch
        run: |
          git subtree split --prefix=demo -b demo-branch
        
      - name: Apply modifications
        run: |
          git checkout demo-branch

          # Update README
          sed -i 's|> Better Invite Starter code is also available on a separate \[repository\](https://github.com/better-invite/better-invite-starter/tree/main)|> Better Invite Starter code is also available on the \[Better Invite monorepo\](https://github.com/better-invite/better-invite/tree/main/demo)|' README.md

          # Create .github files
          mkdir -p .github

          # Copy files from monorepo
          git --work-tree=. checkout main -- .github/CODEOWNERS

          # Commit changes
          git add .
          git commit --amend --no-edit

      - name: Push to template repo
        run: |
          git remote add template https://x-access-token:${{ secrets.TEMPLATE_REPO_TOKEN }}@github.com/better-invite/better-invite-starter.git
          git push template demo-branch:${{ github.ref_name }} --force