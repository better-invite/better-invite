name: Sync demo to template repo

on:
  push:
    branches:
      - main
      - beta
    paths:
      - 'demo/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: better-invite
          repositories: better-invite-starter
    
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Set Commiter
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Create subtree branch
        run: |
          git subtree split --prefix=demo -b demo-branch
        
      - name: Apply modifications
        run: |
          git checkout demo-branch

          # Update README

          # Update separate repository reference
          # We replace the text "Better Invite Starter code is also available..." with new text
          # We also add an image showing how to use the template from the GitHub UI
          sed -i '
          s|> ℹ️ Better Invite Starter code is also available.*|> ℹ️ This template was automatically generated from the [Better Invite monorepo](https://github.com/better-invite/better-invite/tree/main/demo)  \
          > ⚠️ Please open any issues or pull requests on the [Better Invite monorepo](https://github.com/better-invite/better-invite)  \
          \
          <img width="1542" height="853" alt="Use as template" src="https://github.com/user-attachments/assets/ad1bac20-675b-4df1-9829-449ca5be3578" />|
          ' README.md
          
          # Update title
          perl -0777 -pe 's|<h1 align="center">\s*Better Invite Starter\s*</h1>|<h1 align="center">\n  Better Invite Starter Template\n</h1>|s' README.md > README.tmp && mv README.tmp README.md

          # Create .github files
          mkdir -p .github

          # Copy files from monorepo
          git --work-tree=. checkout main -- .github/CODEOWNERS
          git --work-tree=. checkout main -- LICENSE
          git --work-tree=. checkout main -- biome.json

          sed -i '1s|{|{\n  "$comment": "This file was copied from the Better Invite monorepo. It may not work as expected in this template. Modify as needed.",|' biome.json

          # Commit changes
          git add .
          git commit -m "chore: sync demo from monorepo (this is an automated commit)"

      - name: Push to template repo
        run: |
          git remote add template https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/better-invite/better-invite-starter.git
          git push template demo-branch:${{ github.ref_name }} --force