name: Sync demo to template repo

on:
  push:
    branches:
      - main
      - beta
    paths:
      - 'demo/**'
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force push instead of merge"
        required: false
        default: "false"

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      COMMIT_BODY: "This is an automated commit generated by the Better Invite Starter Bot 🤖."

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: better-invite
          repositories: better-invite-starter

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Set Git identity
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Create subtree branch
        run: |
          git subtree split --prefix=demo -b demo-branch

      - name: Apply modifications to demo branch
        run: |
          git checkout demo-branch

          # Update README
          sed -i '
          s|> ℹ️ Better Invite Starter code is also available.*|> ℹ️ This template was automatically generated from the [Better Invite monorepo](https://github.com/better-invite/better-invite/tree/main/demo)  \
          > ⚠️ Please open any issues or pull requests on the [Better Invite monorepo](https://github.com/better-invite/better-invite)  \
          \
          <img width="1542" height="853" alt="Use as template" src="https://github.com/user-attachments/assets/ad1bac20-675b-4df1-9829-449ca5be3578" />|
          ' README.md || true

          perl -0777 -pe 's|<h1 align="center">\s*Better Invite Starter\s*</h1>|<h1 align="center">\n  Better Invite Starter Template\n</h1>|s' README.md > README.tmp && mv README.tmp README.md || true

          mkdir -p .github

          git --work-tree=. checkout main -- .github/CODEOWNERS || true
          git --work-tree=. checkout main -- LICENSE || true
          git --work-tree=. checkout main -- biome.json || true

          sed -i '1s|{|{\n  "$comment": "This file was copied from the Better Invite monorepo. It may not work as expected in this template. Modify as needed.",|' biome.json || true

          git add .

          # ✅ solo commit si hay cambios
          if ! git diff --cached --quiet; then
            git commit -m "chore: prepare demo branch" -m "$COMMIT_BODY"
          fi

      - name: Clone template repository
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/better-invite/better-invite-starter.git template
          cd template
          git checkout ${{ github.ref_name }} || git checkout -b ${{ github.ref_name }}

      - name: Try smart merge
        id: smart-merge
        run: |
          set +e
          cd template

          git remote add source .. || true
          git fetch source demo-branch

          git merge source/demo-branch --allow-unrelated-histories \
            -m "chore: smart sync from monorepo" \
            -m "$COMMIT_BODY" \
            -m "It syncs the latest changes from the monorepo demo/ directory into the template repository." \
            -m "See more: https://github.com/better-invite/better-invite/tree/main/demo"

          if [ $? -ne 0 ]; then
            echo "merge_failed=true" >> $GITHUB_OUTPUT
          else
            echo "merge_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve conflicts (README + biome)
        if: steps.smart-merge.outputs.merge_failed == 'true' && github.event.inputs.force_push != 'true'
        run: |
          cd template

          if [ -f README.md ]; then
            git checkout --theirs README.md || true
            git add README.md
          fi

          if [ -f biome.json ]; then
            git checkout --theirs biome.json || true
            git add biome.json
          fi

          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-resolve conflicts (README + biome)" -m "$COMMIT_BODY"
          fi

          if git diff --name-only --diff-filter=U | grep .; then
            echo "still_conflicts=true" >> $GITHUB_OUTPUT
          else
            echo "still_conflicts=false" >> $GITHUB_OUTPUT
          fi

      - name: Force push (manual override)
        if: github.event.inputs.force_push == 'true'
        run: |
          git remote add template https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/better-invite/better-invite-starter.git
          git push template demo-branch:${{ github.ref_name }} --force

      - name: Ensure README and biome are committed
        if: (steps.smart-merge.outputs.merge_failed == 'false' || steps.smart-merge.outputs.still_conflicts == 'false') && github.event.inputs.force_push != 'true'
        run: |
          cd template

          git add README.md biome.json 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: ensure README and biome.json are up to date" -m "$COMMIT_BODY"
          fi

      - name: Push changes
        if: (steps.smart-merge.outputs.merge_failed == 'false' || steps.smart-merge.outputs.still_conflicts == 'false') && github.event.inputs.force_push != 'true'
        run: |
          cd template
          git push origin ${{ github.ref_name }}