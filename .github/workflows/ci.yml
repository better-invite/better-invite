name: CI
on:
  push:
    branches:
      - main
      - beta
  pull_request:
    types: [opened, synchronize]
  merge_group:

permissions:
  contents: read # for checkout

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # TODO: Remove the `if` condition once we have a better way to skip CI for the push after the merge queue.
    if: |
      github.event_name == 'merge_group' ||
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'push' &&
        !contains(github.event.head_commit.message, '(#')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    # TODO: Remove the `if` condition once we have a better way to skip CI for the push after the merge queue.
    if: |
      github.event_name == 'merge_group' ||
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'push' &&
        !contains(github.event.head_commit.message, '(#')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
  test:
    name: Test
    runs-on: ubuntu-latest
    # TODO: Remove the `if` condition once we have a better way to skip CI for the push after the merge queue.
    if: |
      github.event_name == 'merge_group' ||
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'push' &&
        !contains(github.event.head_commit.message, '(#')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm coverage
  build:
    name: Build
    runs-on: ubuntu-latest
    # TODO: Remove the `if` condition once we have a better way to skip CI for the push after the merge queue.
    if: |
      github.event_name == 'merge_group' ||
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'push' &&
        !contains(github.event.head_commit.message, '(#')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
  ci:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: always()
    steps:
      - uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
  release:
    name: Release
    needs: [lint, typecheck, test, build]
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    if: github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/beta')

    uses: ./.github/workflows/release.yml
    secrets: inherit
