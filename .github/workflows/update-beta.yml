name: Keep beta up to date

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write

jobs:
  sync-beta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: |
          git fetch origin main
          git fetch origin beta

      - name: Check if beta is behind main
        id: check
        run: |
          BEHIND=$(git rev-list --count origin/beta..origin/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

      - name: Rebase beta onto main
        if: steps.check.outputs.behind != '0'
        run: |
          git checkout beta

          if ! git rebase origin/main; then
            echo "## ⚠️ Rebase failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The automatic rebase of \`beta\` onto \`main\` requires manual conflict resolution." >> $GITHUB_STEP_SUMMARY

            git rebase --abort || true
            exit 1
          fi

          git push --force-with-lease origin beta

          echo "## ✅ Rebase successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`beta\` has been successfully rebased onto \`main\`." >> $GITHUB_STEP_SUMMARY